# REUSE.toml for off-on-dev/website. Tailored to the repo's actual file tree.
# Code = MIT, written content/docs = CC BY 4.0, bundled fonts = OFL-1.1.
# The OffOn name/logo are reserved separately — see TRADEMARK.md.
#
# License texts live in ./LICENSES/ (MIT.txt, CC-BY-4.0.txt, OFL-1.1.txt).
# The reuse.yml Action runs `reuse lint` on every push/PR; if it flags a file,
# add that path to the closest block below.

version = 1

# --- Application source code: MIT ---
# src/, e2e/, scripts/, schemas/ contents, plus root-level TS/JS/CSS.
[[annotations]]
path = ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", "**/*.mjs", "**/*.cjs", "**/*.css", "**/*.html"]
SPDX-FileCopyrightText = "OffOn.dev contributors"
SPDX-License-Identifier = "MIT"

# --- Config, tooling, lockfiles, functional metadata: MIT ---
[[annotations]]
path = [
  "**/*.json", "**/*.yml", "**/*.yaml", "**/*.toml",
  "**/*.config.js", "**/*.config.ts", "components.json",
  ".gitignore", ".npmrc", ".nvmrc", ".markdownlintignore",
  "**/*.xml", "**/*.ico", "**/*.webmanifest", "public/robots.txt",
  "public/.well-known/api-catalog",
  ".github/**", "schemas/**", "scripts/**", "e2e/**",
]
SPDX-FileCopyrightText = "OffOn.dev contributors"
SPDX-License-Identifier = "MIT"

# --- Written content & docs: CC BY 4.0 ---
# Docs, images, authored adventure YAML, generated TS derived from YAML,
# solution walkthroughs, and downloadable templates.
# Utility/structural TS in src/data/ (types, utils, constants) stays MIT via block 1.
[[annotations]]
path = [
  "**/*.md", "**/*.mdx", "**/*.jpg", "**/*.jpeg", "**/*.webp",
  "src/data/adventures/*/adventure.yaml",
  "src/data/adventures/*.generated.ts",
  "src/data/community-leaders.json",
  "src/data/solutions/*/*.ts",
  "public/.well-known/security.txt", "public/llms.txt", "public/llms-full.txt",
  "public/downloads/**",
]
SPDX-FileCopyrightText = "OffOn.dev contributors"
SPDX-License-Identifier = "CC-BY-4.0"

# --- ACCESSIBILITY.md: adapted from The Website Specification (CC BY 4.0) ---
[[annotations]]
path = ["ACCESSIBILITY.md"]
SPDX-FileCopyrightText = [
  "OffOn.dev contributors",
  "Joost de Valk and contributors (https://specification.website)",
  "Mike Gifford and contributors (https://github.com/mgifford/ACCESSIBILITY.md)",
]
SPDX-License-Identifier = "CC-BY-4.0"

# --- PNG/SVG assets (incl. e2e visual-regression snapshots): MIT ---
# These are mostly generated test artifacts and UI assets; MIT keeps it simple.
[[annotations]]
path = ["**/*.png", "**/*.svg"]
SPDX-FileCopyrightText = "OffOn.dev contributors"
SPDX-License-Identifier = "MIT"

# --- Reveal.js vendored library: MIT (Hakim El Hattab) ---
# Four-file subset of reveal.js@6.0.1: reset.css, reveal.css, reveal.js, plugin/notes.js.
# Overrides the blanket **/*.js|css rules from blocks 1 and 5 for this subtree.
[[annotations]]
path = ["public/reveal/**"]
SPDX-FileCopyrightText = "Copyright (C) 2011-2026 Hakim El Hattab, https://hakim.se"
SPDX-License-Identifier = "MIT"

# --- Bundled fonts: upstream OFL-1.1 (replace copyright with each OFL.txt's lines) ---
[[annotations]]
path = ["public/fonts/**", "**/*.woff", "**/*.woff2", "**/*.ttf", "**/*.otf"]
SPDX-FileCopyrightText = [
  "Copyright (c) 2016 The Inter Project Authors (https://github.com/rsms/inter)",
  "Copyright 2020 The JetBrains Mono Project Authors (https://github.com/JetBrains/JetBrainsMono)",
  "Copyright 2017 The Syne Project Authors (https://gitlab.com/bonjour-monde/fonderie/syne-typeface)",
]
SPDX-License-Identifier = "OFL-1.1"

# --- shadcn/ui generated components: MIT (OffOn.dev contributors + upstream origin) ---
[[annotations]]
path = ["src/components/ui/badge.tsx", "src/components/ui/tooltip.tsx"]
SPDX-FileCopyrightText = [
  "OffOn.dev contributors",
  "shadcn (https://ui.shadcn.com)",
]
SPDX-License-Identifier = "MIT"

# --- Adventure content: per-contributor attribution (CC BY 4.0) ---
# These blocks override the global adventure YAML and generated.ts blocks above
# to name the individual who authored each adventure.
[[annotations]]
path = [
  "src/data/adventures/blind-by-design/adventure.yaml",
  "src/data/adventures/blind-by-design.generated.ts",
]
SPDX-FileCopyrightText = [
  "OffOn.dev contributors",
  "Simon Schrottner (https://schrottner.at/)",
]
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = [
  "src/data/adventures/building-cloudhaven/adventure.yaml",
  "src/data/adventures/building-cloudhaven.generated.ts",
  "src/data/adventures/echoes-lost-in-orbit/adventure.yaml",
  "src/data/adventures/echoes-lost-in-orbit.generated.ts",
  "src/data/adventures/lex-imperfecta/adventure.yaml",
  "src/data/adventures/lex-imperfecta.generated.ts",
  "src/data/adventures/the-ai-observatory/adventure.yaml",
  "src/data/adventures/the-ai-observatory.generated.ts",
]
SPDX-FileCopyrightText = [
  "OffOn.dev contributors",
  "Katharina Sick (https://ksick.dev/)",
]
SPDX-License-Identifier = "CC-BY-4.0"

# --- Solution walkthroughs and screenshots: Katharina Sick (CC BY 4.0) ---
[[annotations]]
path = [
  "src/data/solutions/echoes-lost-in-orbit/beginner.ts",
  "src/data/solutions/echoes-lost-in-orbit/expert.ts",
  "src/data/solutions/echoes-lost-in-orbit/intermediate.ts",
  "public/solutions/echoes-lost-in-orbit/**",
]
SPDX-FileCopyrightText = [
  "OffOn.dev contributors",
  "Katharina Sick (https://ksick.dev/)",
]
SPDX-License-Identifier = "CC-BY-4.0"
