  - level: intermediate
    emoji: 🟡
    title: Governing the Provinces
    devcontainer: lex-imperfecta_intermediate
    community_url: ""
    summary: Fix a misconfigured Kyverno policy estate and use Policy Reporter to restore proper governance across the
      Republic's provinces.
    audience: Platform engineers and SREs who have some familiarity with Kyverno — ideally after completing the Beginner
      level. You should be comfortable reading Kubernetes YAML and basic kubectl commands.
    backstory:
      - The Republic has grown. What once was a single city is now a sprawling empire of provinces, each governed by
        different magistrates with different needs. The legal scholars decided to catalogue every law in a central
        archive — the Tabularium — so that each province's statutes could be tracked and audited in one place.
      - But cataloguing the laws introduced new chaos. Policies meant for one province are bleeding into another.
        Exceptions that were meant to be narrow have been written too broadly. And somewhere in the estate, a workload
        is slipping through that shouldn't be.
      - "The Tabularium's auditors have handed you a report: Policy Reporter shows violations where there should be
        none, and silence where there should be enforcement. Your mission: investigate the policy estate, fix the
        scoping issues, and restore order before the provinces descend into chaos."
    objective:
      - The **empire-wide laws** enforce correctly across every province — privileged containers are blocked, and every
        workload declares a valid `republic.rome/gens` and a `republic.rome/province` that matches the namespace it runs
        in. Policies must scope to provinces using the namespace labels as the source of truth, not by hardcoding
        individual namespace names.
      - "**Aegyptus's provincial scribe law** takes effect only within Aegyptus — it admits only workloads carrying
        `republic.rome/role: scribe` there, and has no power over the other provinces"
      - The **legacy exception** is scoped to Aegyptus alone — only Aegyptus's grandfathered workload is spared the
        census, and no workload in any other province can claim it
      - The **Tabularium's ledger** is clean and on file — the estate's policy report is exported in the OpenReports
        format and saved as `estate-audit.yaml`
    what_you_learn:
      - How to scope policies using [ValidatingPolicy](https://kyverno.io/docs/policy-types/validating-policy/)
        (cluster-wide) and [NamespacedValidatingPolicy](https://kyverno.io/docs/policy-types/validating-policy/)
        (per-namespace), and when to use each
      - How [CEL expressions](https://kubernetes.io/docs/reference/using-api/cel/) in `ValidatingPolicy` and
        `PolicyException` express fine-grained admission conditions
      - How to write and scope a [PolicyException](https://kyverno.io/docs/policy-types/policy-exception/) correctly so
        only the intended workloads are exempt
      - How to use [Policy Reporter](https://kyverno.github.io/policy-reporter/) and the
        [OpenReports](https://kyverno.github.io/policy-reporter/guide/openreports/) format to audit and debug a policy
        estate across multiple namespaces
    architecture:
      - "The Republic's policy estate spans five namespaces. Four are **provinces** — `gallia`, `hispania`, `britannia`,
        and `aegyptus` — each carrying the label `republic.rome/realm: province`. The fifth, `castra`, is the **infra**
        namespace (`republic.rome/realm: infra`) and operates outside the provinces' legal jurisdiction. Use `kubectl
        get ns --show-labels` to inspect these labels — they are what the cluster-wide policies use to decide where to
        enforce."
      - "The estate is governed by a handful of Kyverno policies. Two are **empire-wide**: `no-privileged-containers`
        blocks privileged containers, and `require-census` requires every workload to declare its `republic.rome/gens`
        and a `republic.rome/province` that matches its namespace. Both are meant to apply across the provinces but not
        the infra realm. Aegyptus also carries a **local law of its own** — `aegyptus-require-scribe-role` — meant to
        admit only scribe workloads *within Aegyptus*. Finally, a **`PolicyException`** grandfathers Aegyptus's single
        legacy workload, which predates the census, so it alone may run without a gens. Some of these are no longer
        doing exactly what they were meant to."
      - "**Edit `manifests/policies/` and `manifests/exceptions/`** — that is where the scoping has gone wrong. Leave
        `manifests/workloads/` and `manifests/namespaces/` alone; the workloads represent the citizens and their
        expected state, and the namespace labels are the ground truth the policies are measured against. Policies act at
        admission, so after each change run `make apply` to redeploy the workloads and re-evaluate the estate, then
        `make verify` to check your progress. When the estate is in order, file the audit with the Tabularium (see How
        to Play)."
    toolbox:
      - name: kubectl
        url: https://kubernetes.io/docs/reference/kubectl/
        description: Apply and inspect cluster resources, check namespace labels and policy status
      - name: kyverno CLI
        url: https://kyverno.io/docs/kyverno-cli/
        description: Test and lint policies locally before applying to the cluster
      - name: k9s
        url: https://k9scli.io/
        description: Explore cluster resources and policy reports in a terminal UI
    services:
      - name: Policy Reporter
        port: 30110
        description: Audit the full policy estate — see which policies apply to which namespaces and where violations exist
    how_to_play:
      - id: explore
        title: Explore the Estate
        content: |
          When your Codespace is ready, the policy estate is already deployed — but something is wrong.
          Open Policy Reporter at the forwarded port **30110** to get an overview of the estate:

          - Which namespaces have violations?
          - Which policies are generating results, and which are silent when they shouldn't be?

          Then dig into the cluster:

          ```bash
          # Inspect the namespace topology — the labels here drive policy scoping
          kubectl get ns --show-labels

          # List all policies — note which are cluster-wide and which are namespaced
          kubectl get validatingpolicies
          kubectl get namespacedvalidatingpolicies -A

          # Inspect any policy or exception in full
          kubectl get validatingpolicy <name> -o yaml
          kubectl get policyexceptions -A -o yaml

          # See the raw OpenReports data behind Policy Reporter
          kubectl get policyreports -A
          ```

          You can also launch **k9s** for a terminal UI view:

          ```bash
          k9s
          ```
      - id: fix
        title: Fix the Policies
        content: >
          Review the [Objective](#objective) and investigate what is wrong in `manifests/policies/` and

          `manifests/exceptions/`.


          Think about what each policy is *supposed* to cover, and compare that against what it is *actually*

          matching. The namespace labels you saw with `kubectl get ns --show-labels` are a key part of the picture.


          **Test locally with the Kyverno CLI before applying:**


          ```bash

          kyverno apply manifests/policies/require-census.yaml --resource manifests/workloads/citizens.yaml

          kyverno apply manifests/policies/aegyptus-require-scribe-role.yaml --resource
          manifests/workloads/aegyptus-legacy-scribe.yaml

          ```


          **Apply your changes to the cluster:**


          ```bash

          make apply

          ```


          Policies only act at admission, so `make apply` redeploys the workloads to re-evaluate the estate against

          your changes. Then check Policy Reporter again — the picture should improve as you fix each issue.
      - id: file
        title: File the Audit
        content: |
          Once the estate is in order, the Senate expects the Tabularium's ledger on file. Export the cluster's
          policy reports, the OpenReports data behind Policy Reporter, as the audit of record.

          ```bash
          kubectl get policyreports -A -o yaml > estate-audit.yaml
          ```
    helpful_links:
      - title: Kyverno ValidatingPolicy
        url: https://kyverno.io/docs/policy-types/validating-policy/
        description: Reference docs for ValidatingPolicy and NamespacedValidatingPolicy — the policy types you'll fix
      - title: Kyverno PolicyException
        url: https://kyverno.io/docs/policy-types/policy-exception/
        description: How to write and scope a PolicyException to exempt specific workloads
      - title: CEL Validation Expressions
        url: https://kubernetes.io/docs/reference/using-api/cel/
        description: How CEL expressions work in Kubernetes admission — including accessing namespace context
      - title: Policy Reporter
        url: https://kyverno.github.io/policy-reporter/
        description: How to use Policy Reporter to audit and visualise policy results across the cluster
      - title: OpenReports Format
        url: https://kyverno.github.io/policy-reporter/guide/openreports/
        description: The OpenReports standard that Kyverno uses to emit PolicyReport resources
