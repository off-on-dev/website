backstory:
  - The Roman Republic has built a sophisticated legal system to protect its citizens — but the laws were written in
    haste, and the exceptions were written too generously. Policies go unenforced, the wrong citizens are exempt, and
    something has slipped through the gates unnoticed. As a newly appointed Praetor, your mission is to restore order
    before chaos takes hold.
overview:
  - The Republic's legal system is in disarray — workloads run unchecked, required labels go missing, and privileged
    containers slip through the gates. As a newly appointed Praetor, your mission is to restore order by fixing broken
    Kyverno policies and enforcing proper admission control.
