  - level: intermediate
    emoji: 🟡
    title: Sea Trial
    devcontainer: dead-reckoning_intermediate
    codespaces_machine: 4core
    community_url: https://community.offon.dev/t/fix-a-broken-delivery-pipeline-july-2026-adventure-intermediate/1668
    summary: Fix the broken integration points in the delivery pipeline so that commissioning a vessel in Backstage results
      in a running deployment.
    topics:
      - Backstage
      - Gitea
      - Argo Events
      - Argo Workflows
      - Argo CD
    audience: Platform and <abbr title="Development and Operations">DevOps</abbr> engineers who have met these tools before and want to see how they fit together. You
      should be comfortable with Kubernetes, YAML, and reading a tool's logs and <abbr title="User Interface">UI</abbr>. Prior exposure to Backstage, Gitea,
      and the Argo projects helps, but the focus here is the integration between them, not any one tool.
    backstory:
      - "The commission office is back in business: manifests are filed, repositories are created, and every new vessel
        is entered into the fleet registry. Yet the captains keep coming back with the same complaint. Their vessels are
        commissioned on paper, but they never actually sail."
      - "Between the commission office and open water lies a chain of yards, each meant to pick up where the last left
        off: a push to the archives should summon the shipyard, the shipyard should build the hull from the plans and
        hand it to the harbor master, and the harbor master should bring the finished vessel into formation. Somewhere
        along that chain the handoffs are misconfigured, and every vessel stalls before it reaches the water."
      - "Your mission: trace a single commission from the office all the way to open water, find every point where the
        chain is broken, and repair the integrations so that commissioning a vessel results in a running ship you can
        reach directly."
    objective:
      - "A commissioned vessel is fully delivered: its code and deployment repositories exist, its delivery workflow has
        completed, its Argo CD Application is synced, and its service is running in the cluster"
      - See the vessel's live deployment status on its page in Backstage
      - The vessel's service is reachable directly and reports itself seaworthy
    what_you_learn:
      - "How a Git webhook drives a workflow engine: Argo Events
        [Sensors](https://argoproj.github.io/argo-events/concepts/sensor/) turn a push into a
        [parameterized](https://argoproj.github.io/argo-events/tutorials/02-parameterization/) workflow run"
      - How [Argo Workflows](https://argo-workflows.readthedocs.io/en/latest/walk-through/steps/) runs a multi-step
        delivery pipeline, and the [RBAC](https://argo-workflows.readthedocs.io/en/latest/workflow-rbac/) its steps need
      - How an Argo CD
        [ApplicationSet](https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-SCM-Provider/)
        auto-discovers repos and [syncs](https://argo-cd.readthedocs.io/en/stable/user-guide/auto_sync/) them into the
        cluster
      - How Backstage [annotations](https://backstage.io/docs/features/software-catalog/well-known-annotations) tie a
        catalog entity to its live deployment status
      - How to trace a silent failure across tools from each one's logs and UI
    architecture:
      - Commissioning a vessel kicks off a delivery pipeline that spans several tools. Backstage files two repositories
        in Gitea (the vessel's code and its deployment manifests). A push to the code repository fires a Gitea webhook
        into **Argo Events**, whose Sensor submits an **Argo Workflow**. That workflow clones the code, builds a
        container image and pushes it to Gitea's registry, then stamps the new image tag onto the deployment repository.
        **Argo CD** discovers the deployment repository and syncs it into the cluster as a running Deployment and
        Service. The diagram below shows the full chain.
      - "Each vessel's page in Backstage is your cockpit: it shows the vessel's live Argo CD sync and health and its
        delivery workflows, so you can watch a commission progress and spot where it stalls. Alongside it, use each
        tool's own view: Gitea's repositories and a webhook's Recent Deliveries, the Argo Workflows UI (port 30113), and
        the Argo CD UI (port 30100)."
      - "You edit two things: the delivery pipeline manifests under `platform/` (`argo-events/`, `argo-workflows/`,
        `argocd/`) and the vessel commissioning template under `backstage/templates/vessel-commissioning-template/`."
      - "This level runs a real container build on a Kubernetes cluster. It works on the default Codespace, but if you
        hit resource problems or the pipeline feels sluggish, upgrade to a larger (**4-core / 16 GB**) machine. Either
        way, give the pipeline a few minutes after commissioning: the first build pulls its base images before an image
        ever reaches the cluster."
      - '> A quick translation from the story to the tools: a **vessel** is a small service you deploy, made up of its
        code repository, its deployment manifests, and the running Deployment and Service in the cluster. The
        **commission office** is Backstage, the **archives** are Gitea, the **shipyard** is Argo Workflows, and the
        **harbor master** is Argo CD; Argo Events is the lookout that summons the shipyard when new code is filed. A
        vessel "reaching open water" just means a commissioned service made it all the way to a running, reachable
        deployment.'
    architecture_diagram: dead-reckoning-intermediate.svg
    diagram_alt: "Left-to-right delivery pipeline: Backstage creates the repositories, Argo Events triggers the CI build,
      Argo Workflows builds the image and updates the tag, Argo CD syncs the deployment, and the vessel's app is up and
      running."
    toolbox:
      - name: Backstage
        url: https://backstage.io/docs/features/software-catalog/
        description: The commission office and your cockpit (port 3000). Commission a vessel from Create, then watch its page
          for the vessel's Argo CD status and delivery workflows.
      - name: Gitea
        url: https://docs.gitea.com/
        description: The archives (port 30112). Holds each vessel's code and deployment repositories, the org webhook, and the
          container registry. A webhook's Recent Deliveries shows whether a push was delivered.
      - name: Argo Workflows
        url: https://argo-workflows.readthedocs.io/en/latest/
        description: The shipyard (port 30113). Runs the multi-step build-and-deliver workflow; its UI shows each run, step by
          step, and why a step failed.
      - name: Argo CD
        url: https://argo-cd.readthedocs.io/en/stable/
        description: The harbor master (port 30100). Discovers deployment repositories and reconciles them into the cluster; its
          UI shows each vessel's sync and health.
    services:
      - name: Backstage
        port: 3000
        description: The commission office and your cockpit. Start it with `make backstage`, then commission vessels and watch
          each one's page. Signs in as a guest, no credentials needed.
      - name: Gitea
        port: 30112
        credentials: admin / a-super-secure-password
        description: "The archives: each vessel's code and deployment repositories, the org webhook (Recent Deliveries), and the
          container registry."
      - name: Argo Workflows
        port: 30113
        description: "The shipyard: the delivery workflow runs, step by step, with per-step logs. No sign-in required."
      - name: Argo CD
        port: 30100
        credentials: readonly / a-super-secure-password
        description: "The harbor master: each vessel's Application, sync status, and health."
    how_to_play:
      - id: start
        title: Open the Commission Office
        content: |
          Start Backstage with `make backstage`. The first run compiles for ~30-60s; once it's up, the commission
          office is available in your browser on port 3000. Leave it running in that terminal; restart any time with
          Ctrl-C then `make backstage`.

          The rest of the platform (Gitea, Argo Events, Argo Workflows, Argo CD) is already running in the cluster.
      - id: explore
        title: Trace a Commission
        content: |
          In Backstage, go to **Create** and run the **Commission a Vessel** template. It will commission cleanly, but
          the vessel won't sail. That's expected: your job is to find out why.

          Open the new vessel's page in the catalog. It's your cockpit: it shows the vessel's Argo CD deployment status
          and its delivery workflows. From there, follow the chain outward and see how far each commission gets:

          - **Gitea** (port 30112): were both repositories created? Did the push reach the pipeline (check a webhook's
            Recent Deliveries)?
          - **Argo Workflows** (port 30113): did a build run for this vessel, and if it failed, what does the failing
            step report?
          - **Argo CD** (port 30100): is there an Application for the vessel, and is it synced and healthy?

          Each tool shows you one handoff. Follow the data from one to the next until you find where it stalls.
      - id: fix
        title: Repair the Integrations
        content: |
          The breaks live in the delivery pipeline manifests and the commissioning template:

          ```text
          platform/argo-events/
          platform/argo-workflows/
          platform/argocd/
          backstage/templates/vessel-commissioning-template/
          ```

          Read the relevant file top to bottom and compare it against what you observed. After editing a `platform/`
          manifest, re-apply it with `make apply`. Because the pipeline is triggered by a push, test a fix by
          commissioning a fresh vessel (or redelivering the push from Gitea's Recent Deliveries). Changes to the
          template take effect on the next vessel you commission.

          When you think a vessel can sail end to end, check your work. `make verify` grades the most recently
          commissioned vessel stage by stage and reports the first place the pipeline runs aground:

          ```bash
          make verify
          ```
    verification:
      command: make verify
      description: Grades the most recently commissioned vessel stage by stage, from its repositories through the delivery
        workflow to a synced Argo CD Application and a reachable service, and reports the first place the pipeline runs
        aground.
    helpful_links:
      - title: "Backstage: Well-known Annotations"
        url: https://backstage.io/docs/features/software-catalog/well-known-annotations
        description: How annotations on a catalog entity link it to external systems shown on its page
      - title: "Argo Events: Sensor"
        url: https://argoproj.github.io/argo-events/concepts/sensor/
        description: How a Sensor listens for events and triggers actions, and how it shapes a trigger from the event's data
      - title: "Argo Workflows: Steps"
        url: https://argo-workflows.readthedocs.io/en/latest/walk-through/steps/
        description: How a workflow chains multiple steps and passes data between them
      - title: "Argo Workflows: Workflow RBAC"
        url: https://argo-workflows.readthedocs.io/en/latest/workflow-rbac/
        description: What permissions a workflow's service account needs for its steps to run and report status
      - title: "Argo CD: SCM Provider Generator"
        url: https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-SCM-Provider/
        description: How an ApplicationSet auto-discovers repositories and turns each into an Application
      - title: "Argo CD: Automated Sync"
        url: https://argo-cd.readthedocs.io/en/stable/user-guide/auto_sync/
        description: How Argo CD reconciles an Application's desired state into the cluster
    deadline: 2026-07-28T23:59:00+01:00
  - level: expert
    emoji: 🔴
    title: The Chronometer
    devcontainer: dead-reckoning_expert
    community_url: https://community.offon.dev/t/trace-a-silent-failure-across-your-delivery-pipeline-july-2026-adventure-expert/1671
    summary: Repair the fleet's broken navigation log, then use the complete trace it produces to find why vessels arrive
      carrying the wrong cargo.
    topics:
      - Backstage
      - Argo Workflows
      - Argo CD
      - OpenTelemetry
      - Jaeger
    audience: Platform and DevOps engineers who already know how the delivery pipeline fits together and want to see how a
      distributed trace ties it into one story. You should be comfortable with Kubernetes, YAML, and reading a tool's
      logs and UI. Prior exposure to OpenTelemetry, trace context propagation, and a trace viewer like Jaeger helps, but
      the focus here is using a trace to reason across service boundaries, not any one tool.
    backstory:
      - "Every commission the office issues is supposed to leave one clean line in the navigation log: the moment a
        captain fills in the papers, the yards that build and deliver the vessel, and the harbor master bringing it into
        formation, all recorded as a single voyage you can read end to end. Read the log and you know exactly what
        happened to any vessel, and when."
      - "Lately the log lies. It records the commission office plainly enough, then goes dark the instant a vessel
        leaves for the yards: the shipyard's and harbor master's work never appears on the same line. And at the far end
        of the voyage, captains keep signing for the wrong cargo, salt-pork where citrus was ordered, though every yard
        along the route reported a clean, successful run. No single tool shows anything wrong."
      - "Your mission: repair the log so a commission reads as one unbroken voyage again, from the office all the way to
        open water, then use that complete picture to find where the cargo goes astray, and set it right."
    objective:
      - Every commission appears in the navigation log (Jaeger) as a single, connected trace, unbroken from the
        commission office (Backstage) through the shipyard (Argo Workflows) and the harbor master (Argo CD)
      - Every vessel sails carrying the provisions it was commissioned to carry
    what_you_learn:
      - "How trace context crosses an asynchronous boundary with no call chain: a commission carries its [W3C
        traceparent](https://www.w3.org/TR/trace-context/) to a push-triggered pipeline, so its spans [continue the same
        trace](https://opentelemetry.io/docs/concepts/context-propagation/) instead of starting a new one"
      - "Why a [distributed trace](https://opentelemetry.io/docs/concepts/signals/traces/) reveals what per-tool logs
        cannot: the value that flowed through each step, so a fault surfaces where the data diverges"
      - How to read that trace in [Jaeger](https://www.jaegertracing.io/docs/latest/) to localise a fault to a single
        service by following one attribute across the whole voyage
    architecture:
      - "This level adds a tracing overlay to the Sea Trial delivery pipeline: every stage now reports spans to an
        **OpenTelemetry Collector**, which forwards them to **Jaeger**. The commission office opens the trace and hands
        its context to the pipeline, so one commission should read as a single connected voyage: `commission <vessel>`
        -> `enter parameters` and `scaffold repos` (Backstage) -> `ci pipeline` (Argo Workflows) -> `rollout` (Argo
        CD)."
      - "The cargo rides that trace at three checkpoints, so you see not just *that* it is wrong but *where* it changed:
        `provisions.ordered` (root span, what was selected), `provisions.declared` (rollout span, what the deployment
        sets), and `provisions.reported` (rollout span, what the running vessel says it carries). In a healthy voyage
        all three agree."
      - "Your repairs live in the vessel commissioning template under
        `backstage/templates/vessel-commissioning-template/` (`template.yaml` and the files under `content/`).
        Everything else, the `platform/` manifests and the Backstage tracing setup, is working: read it to see how the
        trace is carried out to sea, but you won't need to change it."
      - This level runs a real container build, so your Codespace uses a larger (**4-core / 16 GB**) machine. Give the
        pipeline a few minutes after commissioning; the delivery spans land in Jaeger once the rollout completes.
      - "> A quick translation from the story to the tools: a **vessel** is a small service you deploy; its **cargo**
        (**provisions**) is a value it is commissioned to carry, set in its deployment and reported by the running
        service. The **commission office** is Backstage, the **shipyard** is Argo Workflows, the **harbor master** is
        Argo CD, and the **navigation log** is Jaeger. A commission's **voyage** is the single distributed trace that
        should span all of them."
    diagram_alt: "The delivery pipeline runs left to right across the top: Backstage creates the repositories, Argo Events
      triggers the CI build, Argo Workflows builds the image and updates the tag, Argo CD syncs the deployment, and the
      vessel's app is up and running. A W3C traceparent thread runs through the pipeline. Backstage, Argo Workflows, and
      Argo CD each report spans down to the OpenTelemetry Collector, which feeds Jaeger, where a single commission
      appears as one connected trace: a Commission Vessel root span over Backstage, Argo Workflows, and Argo CD spans."
    toolbox:
      - name: Jaeger
        url: https://www.jaegertracing.io/docs/latest/
        description: The navigation log (port 30103). Shows each commission's trace; search by service `backstage` and operation
          `commission <vessel>` to open a voyage, then read its spans and their attributes.
      - name: Backstage
        url: https://backstage.io/docs/features/software-templates/
        description: The commission office and your cockpit (port 3000). Commission a vessel from Create; its page carries a
          Voyage log card that links to the trace.
      - name: Argo Workflows
        url: https://argo-workflows.readthedocs.io/en/latest/
        description: The shipyard (port 30113). Runs the multi-step build-and-deliver workflow and emits the `ci pipeline` spans.
      - name: Argo CD
        url: https://argo-cd.readthedocs.io/en/stable/
        description: The harbor master (port 30100). Reconciles each vessel into the cluster and emits the `rollout` span.
      - name: OpenTelemetry Collector
        url: https://opentelemetry.io/docs/collector/
        description: The signal station every component reports spans to; it forwards them on to Jaeger. Part of the working
          tracing setup, here to read, not to change.
    services:
      - name: Backstage
        port: 3000
        description: The commission office and your cockpit. Start it with `make backstage`, then commission vessels. Signs in
          as a guest, no credentials needed.
      - name: Jaeger
        port: 30103
        description: "The navigation log: each commission's distributed trace, across Backstage, Argo Workflows, and Argo CD. No
          sign-in required."
      - name: Gitea
        port: 30112
        credentials: admin / a-super-secure-password
        description: "The archives: each vessel's code and deployment repositories and the container registry."
      - name: Argo Workflows
        port: 30113
        description: "The shipyard: the delivery workflow runs, step by step, with per-step logs. No sign-in required."
      - name: Argo CD
        port: 30100
        credentials: readonly / a-super-secure-password
        description: "The harbor master: each vessel's Application, sync status, and health."
    how_to_play:
      - id: start
        title: Open the Commission Office
        content: >
          Start Backstage with `make backstage`. The first run compiles for ~30-60s; once it's up, the commission

          office is available in your browser on port 3000. Leave it running in that terminal; restart any time with

          Ctrl-C then `make backstage`.


          The rest of the platform (Gitea, Argo Events, Argo Workflows, Argo CD, the OpenTelemetry Collector, and
          Jaeger)

          is already running in the cluster.
      - id: explore
        title: Sail a Commission and Read the Log
        content: |
          In Backstage, go to **Create** and run the **Commission a Vessel** template. Pick a cargo you'll remember (say
          **Citrus**), and let the vessel sail. Delivery still works, but the records don't add up. You have two
          instruments to check what really happened:

          - **Greet the vessel.** Once it's running, `make ahoi` reports the cargo it's actually carrying.
            Is it what you ordered?
          - **Open the log.** In **Jaeger** (port 30103), search service `backstage`, operation `commission <vessel>`,
            and open the trace. Read it from the commission office outward: how much of the voyage actually reached the
            log?

          The trace is your instrument for both. It carries the cargo along the voyage (`provisions.ordered` ->
          `provisions.declared` -> `provisions.reported`), so once the log reads true end to end, Jaeger is where you
          follow the cargo from order to arrival and find where it goes astray.
      - id: fix
        title: Repair the Log, Then the Cargo
        content: |
          Both repairs live in the vessel commissioning template:

          ```text
          backstage/templates/vessel-commissioning-template/
          ```

          Start with the log. Read how a commission carries its trace context out to the pipeline, and how the pipeline
          picks it back up off the push it reacts to; the two need to line up on the same commit. With the voyage whole,
          the trace shows the cargo at each checkpoint (`provisions.ordered` -> `provisions.declared` ->
          `provisions.reported`): follow it and let it tell you which stage the cargo survives and which one it doesn't.

          Test a fix by commissioning a fresh vessel and watching it sail. If you edited `template.yaml`, reload it into
          Backstage first so the next commission picks up your change:

          ```bash
          make reload-template
          ```
    verification:
      command: make verify
      description: "Grades the most recently commissioned vessel against the two end-states: its commission is one connected
        trace in Jaeger, and the running vessel reports the cargo its deployment declares. Each check reports on its
        own, so you see which half of the log still reads false."
