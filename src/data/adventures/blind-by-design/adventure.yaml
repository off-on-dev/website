  - level: expert
    name: "Read the Chart"
    difficulty: Expert
    deadline: "2026-05-26T23:59:00+01:00"
    audience: >-
      Platform engineers, <abbr title="Site Reliability Engineers">SREs</abbr>, and observability-focused developers who have completed the
      Beginner and Intermediate levels or are comfortable with OpenFeature evaluation context,
      and want to learn how flag evaluations join distributed traces and metrics, and how to
      use a flag flip as an operational lever for live rollbacks.
    topics:
      - OpenFeature
      - OpenTelemetry
      - Grafana
      - Spring Boot
    learnings:
      - "How the OpenFeature OpenTelemetry hooks (TracesHook and MetricsHook) join flag evaluations to the rest of an application's telemetry without a separate ingestion path"
      - "How to author your own Hook: a tiny class that copies merged-eval-context attributes onto the active <abbr title='OpenTelemetry'>OTel</abbr> span, closing the loop between why a flag resolved the way it did and what the operator sees in Tempo"
      - "How fractional rollout in flagd buckets users by targetingKey (same key, same bucket, every request) and how to read that bucketing off a dashboard"
      - "How a flag flip is a faster operational lever than a redeploy when a rollout is misbehaving: the difference between a one-line config change and a twenty-minute deployment"
    devcontainer: 04-blind-by-design_03-expert
    discussion_url: "/t/read-the-chart-adventure-04-expert/1530"
    intro:
      - >-
        Spans are already flowing into Tempo from the OpenFeature TracesHook, but the metrics
        half is dead: the MeterProvider has no exporter and the MetricsHook was never registered.
      - >-
        The dashboard the operator wants to triage from is empty. The k6 loadgen is idle, waiting
        for a flag flip to turn it on.
    backstory:
      - >-
        The trial just went wide. Phase 3 of the new vision amplifier (vision_amplifier_v2) was
        approved for the full cohort yesterday morning. The promise was straightforward: subjects
        emerge with sharper eyesight than they walked in with. By mid-afternoon the audit log was
        screaming. Subjects were stabilising 200ms slower, and roughly one in ten of them was
        emerging blind, with containment failure recorded as an HTTP 500. The lab director pulled
        up the Feature Flag Metrics dashboard expecting to triage visually. The dashboard was dark.
        Someone had wired up traces but never finished the metrics half. There is no chart to read.
        The lab is studying eyesight and the lab itself cannot see.
      - >-
        Your job, in order: turn on the lights, find the bad arm of the trial, and halt enrolment
        on the amplifier, all without redeploying the lab. That last constraint is the whole point
        of feature flags: when a rollout starts misbehaving in production, you need an operational
        lever that does not take twenty minutes to pull. Save the file, watch the dose drop, watch
        the 5xx rate fall back to baseline, watch the next batch of subjects walk out seeing.
    architecture_diagram: "blind-by-design-expert.svg"
    diagram_alt: "Architecture diagram showing four services: Spring Boot app sends traces via OTLP/gRPC to a Grafana LGTM stack, connects via OpenFeature SDK to flagd for feature flag evaluation, and a k6 load generator polls flagd and scrapes metrics from the LGTM stack."
    objective:
      - "Spans for fun-with-flags-java-spring are visible in Tempo with feature_flag.context.<key> attributes. Searching feature_flag.context.dose=underdose lights up requests where a subject was mis-dosed, with feature_flag.variant=clouded on the same span"
      - "feature_flag_evaluation_requests_total is non-zero in Prometheus: flag evaluations show up as counters, not just spans"
      - "The Feature Flag Metrics dashboard renders: variant distribution, error rate, and latency p99 are all populated from the metric counters"
      - "The vision_amplifier_v2 rollout is rolled back to 100% off without redeploying the lab"
      - "HTTP 5xx rate over the last minute drops below 1%: the bad arm is contained"
