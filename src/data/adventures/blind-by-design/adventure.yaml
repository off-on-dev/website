slug: blind-by-design
title: "Blind by Design"
icon: FlaskConical
month: "MAY 2026"
community_category_id: 41
story: >-
  Three levels of OpenFeature with flagd as the provider, in a Java + Spring Boot service.
  Wire the SDK against a flagd sidecar (Beginner), layer evaluation context to target by cohort
  (Intermediate), then instrument flag evaluations with OpenTelemetry and roll back a misbehaving
  fractional rollout (Expert). All without redeploying.
tags:
  - OpenFeature
  - flagd
  - Spring Boot
  - Java
  - OpenTelemetry
  - Grafana

contributor:
  name: "Simon Schrottner"
  url: "https://schrottner.at/"
  about: >-
    <abbr title="Cloud Native Computing Foundation">CNCF</abbr> Ambassador and maintainer of OpenFeature and JUnit Pioneer. Helps teams release faster
    and with more confidence through open standards, feature flagging, and the communities that
    make both possible. A familiar face at KubeCon EU, Devoxx, ContainerDays, and meetups across Europe.

backstory:
  - >-
    The Aletheia Institute is running a multi-phase vision-enhancement trial. The lab is a
    Spring Boot service whose one job is to record the vision_state of every subject who walks
    through the protocol (blurry, sharp, enhanced, or clouded), because subjects don't all arrive
    with the same biology, the same dose adherence, or the same trial-jurisdiction baseline. The
    flag definitions that drive those readings live in flags.json, watched by a flagd sidecar;
    the OpenFeature <abbr title="Software Development Kit">SDK</abbr> is supposed to call that sidecar on every evaluation.
  - >-
    It hasn't been. For the past eight months, every subject through the door has been recorded
    as "untreated": the integration was never finished, and the lab director assumed the system
    was reading the chart. Worse, eight weeks ago the Institute opened its flagship Phase 3 trial:
    a new amplifier variant rolled out fractionally to a cohort by a targeting rule in flags.json.
    Four adverse-event reports have since been filed, each one a subject whose vision_state at
    discharge was worse than at enrollment.
  - >-
    The monitoring is dark, not by accident, but because no one ever turned the lights on. Your
    mission across three levels: stand up the lab so it reads the chart, read the chart by cohort
    so outcomes can be tracked, then turn on the lights and roll back the Phase 3 variant before
    the director signs off on the next enrollment batch.

overview:
  - >-
    OpenFeature is a vendor-neutral standard for feature flags. The reference cloud-native
    implementation is flagd, which serves flag definitions from a JSON file, locally or remotely,
    and the OpenFeature SDK in your application calls it on every evaluation.
  - >-
    In this adventure, the lab uses OpenFeature exactly the way a real engineering team would:
    a Spring Boot service holds the SDK client, flagd holds the flag definitions, and the
    targeting rules in flags.json decide what reading every subject ends up with. By the end,
    you'll have wired the SDK in from scratch, learned to record outcomes by cohort, and rolled
    back a misbehaving Phase 3 trial without redeploying.

