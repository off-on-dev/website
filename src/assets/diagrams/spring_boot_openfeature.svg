  </g>

  <!-- AuditHook → FlagdProvider -->
  <line x1="932" y1="324" x2="932" y2="364" stroke="var(--color-border-primary)" stroke-width="2.5" marker-end="url(#ar)" style="fill:rgb(0, 0, 0);stroke:rgba(222, 220, 209, 0.4);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

