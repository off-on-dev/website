name: New Adventure

on:
  workflow_dispatch:
    inputs:
      id:
        description: 'Adventure ID (kebab-case, e.g. "signal-in-the-storm")'
        required: true
        type: string
      title:
        description: 'Adventure title (e.g. "Signal in the Storm")'
        required: true
        type: string
      month:
        description: 'Release month (e.g. "JUN 2026")'
        required: true
        type: string
      levels:
        description: 'Comma-separated levels (e.g. "beginner" or "beginner,intermediate,expert")'
        required: true
        type: string
        default: 'beginner'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Validate inputs
        env:
          INPUT_ID: ${{ inputs.id }}
          INPUT_LEVELS: ${{ inputs.levels }}
        run: |
          if ! echo "$INPUT_ID" | grep -qE '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then
            echo "Error: Adventure ID must be kebab-case (lowercase letters, numbers, hyphens only)"
            exit 1
          fi
          if ! echo "$INPUT_LEVELS" | grep -qE '^(beginner|intermediate|expert)(,(beginner|intermediate|expert))*$'; then
            echo "Error: Levels must be comma-separated list of beginner, intermediate, expert"
            exit 1
          fi

      - name: Run scaffold script
        env:
          ADVENTURE_ID: ${{ inputs.id }}
          ADVENTURE_TITLE: ${{ inputs.title }}
          ADVENTURE_MONTH: ${{ inputs.month }}
          ADVENTURE_LEVELS: ${{ inputs.levels }}
        run: |
          node scripts/new-adventure.mjs \
            --id "$ADVENTURE_ID" \
            --title "$ADVENTURE_TITLE" \
            --month "$ADVENTURE_MONTH" \
            --levels "$ADVENTURE_LEVELS"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADVENTURE_ID: ${{ inputs.id }}
          ADVENTURE_TITLE: ${{ inputs.title }}
          ADVENTURE_MONTH: ${{ inputs.month }}
          ADVENTURE_LEVELS: ${{ inputs.levels }}
        run: |
          BRANCH="feat/adventure-${ADVENTURE_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: scaffold adventure ${ADVENTURE_ID}"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH"
          {
            printf '## New Adventure Scaffolded\n\n'
            printf '| Field | Value |\n|---|---|\n'
            printf '| ID | `%s` |\n' "$ADVENTURE_ID"
            printf '| Title | %s |\n' "$ADVENTURE_TITLE"
            printf '| Month | %s |\n' "$ADVENTURE_MONTH"
            printf '| Levels | %s |\n\n' "$ADVENTURE_LEVELS"
            printf '### Generated files\n'
            printf -- '- `src/data/adventures/%s/adventure.yaml` (fill in TODOs)\n' "$ADVENTURE_ID"
            printf -- '- Discussion JSON stubs per level\n'
            printf -- '- Routes added to `react-router.config.ts`\n'
            printf -- '- Sitemap entries added\n\n'
            printf '### Next steps\n'
            printf '1. Fill in the TODOs in `src/data/adventures/%s/adventure.yaml`\n' "$ADVENTURE_ID"
            printf '2. Update `discussionUrl` in the YAML and each level `-posts.json` file\n'
            printf '3. Run `npm run generate` to produce the TypeScript from YAML\n'
            printf '4. Run `node scripts/refresh-discussions.mjs`\n'
            printf '5. Run all checks: `npm run lint && npm test && npm run build && npm run test:e2e`\n'
          } > /tmp/pr-body.md
          gh pr create \
            --title "feat: scaffold adventure — ${ADVENTURE_TITLE}" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH"
