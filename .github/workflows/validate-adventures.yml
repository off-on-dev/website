name: Validate Adventures

on:
  pull_request:
    paths:
      - 'src/data/adventures/**'
      - 'src/data/solutions/**'
      - 'src/content.config.ts'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: actions/cache@v6
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      # astro sync loads the content collection and runs the Zod schema over every
      # adventure.yaml. Invalid YAML (unknown field, bad enum, missing required)
      # fails here — this replaces the old ajv `generate-adventures.mjs --validate-only`.
      - name: Validate adventure YAML (Zod content schema)
        run: npm run sync

      - name: Validate adventure consistency
        run: |
          set -euo pipefail
          ERRORS=0
          for adventure_dir in src/data/adventures/*/; do
            adventure_id=$(basename "$adventure_dir")
            [[ -f "$adventure_dir/adventure.yaml" ]] || continue
            echo "Checking adventure: $adventure_id"

            # Live level IDs (under `levels:`, not `upcoming_levels:`)
            level_ids=$(awk '/^levels:/{s=1;next} /^[a-z]/{s=0} s && /- level:/{gsub(/.*- level: /,""); gsub(/"/,""); print}' "$adventure_dir/adventure.yaml" || true)

            for level_id in $level_ids; do
              # A discussion JSON file must exist for each live level.
              if [[ ! -f "$adventure_dir/$level_id-posts.json" ]]; then
                echo "  ❌ Missing discussion JSON: $adventure_dir$level_id-posts.json"
                ERRORS=$((ERRORS + 1))
              fi
            done
            echo "  ✓ Done"
          done
          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "❌ Found $ERRORS consistency error(s)."
            exit 1
          fi
          echo "✓ All adventures are consistent."

      - name: Verify all adventures are registered in ADVENTURE_CATEGORIES
        run: |
          set -euo pipefail
          ERRORS=0
          for adventure_dir in src/data/adventures/*/; do
            adventure_id=$(basename "$adventure_dir")
            [[ -f "$adventure_dir/adventure.yaml" ]] || continue
            if ! grep -q "\"$adventure_id\"" scripts/refresh-leaderboard.mjs; then
              echo "❌ '$adventure_id' is missing from ADVENTURE_CATEGORIES in scripts/refresh-leaderboard.mjs"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "❌ Add missing adventure IDs to ADVENTURE_CATEGORIES in scripts/refresh-leaderboard.mjs before merging."
            exit 1
          fi
          echo "✓ All adventure IDs are registered in ADVENTURE_CATEGORIES."
