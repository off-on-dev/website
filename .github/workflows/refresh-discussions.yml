name: Refresh Discussion Data

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Fetch and update discussion posts
        run: node scripts/refresh-discussions.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/adventures/
          if git diff --cached --quiet; then
            echo "No discussion data changes."
          else
            git commit -m "chore: refresh discussion data [skip ci]"
            git push
          fi
