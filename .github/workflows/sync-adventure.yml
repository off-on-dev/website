name: Sync Adventure from Challenges Repo

on:
  workflow_dispatch:
    inputs:
      adventure_url:
        description: >
          URL of the adventure folder in the challenges repo
          (e.g. https://github.com/off-on-dev/open-source-challenges/tree/main/adventures/05-lex-imperfecta)
        required: true
        type: string
      levels:
        description: >
          Comma-separated level IDs to make live now (e.g. beginner or beginner,intermediate).
          Levels found in the challenges repo but not listed here will be added as "coming soon"
          placeholders in the More Levels sidebar card.
          Leave blank to sync all levels as live.
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Validate URL
        env:
          ADVENTURE_URL: ${{ inputs.adventure_url }}
        run: |
          if ! echo "$ADVENTURE_URL" | grep -qE '^https://github\.com/off-on-dev/open-source-challenges/tree/[^/]+/adventures/'; then
            echo "Error: URL must point to an adventure folder under adventures/ in off-on-dev/open-source-challenges"
            echo "Example: https://github.com/off-on-dev/open-source-challenges/tree/main/adventures/05-lex-imperfecta"
            exit 1
          fi

      - name: Fetch and transform adventure YAML
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADVENTURE_URL: ${{ inputs.adventure_url }}
          LEVELS_TO_SYNC: ${{ inputs.levels }}
        run: node scripts/sync-adventure.mjs

      - name: Validate and regenerate TypeScript
        run: node scripts/generate-adventures.mjs

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG=$(cat /tmp/adventure-slug)
          NAME=$(cat /tmp/adventure-name)
          LEVELS=$(cat /tmp/adventure-levels)
          MODE=$(cat /tmp/adventure-mode)
          BRANCH="feat/adventure-${SLUG}"
          SOURCE_URL="${{ inputs.adventure_url }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add \
            src/data/adventures/${SLUG}/ \
            src/data/adventures/${SLUG}.generated.ts \
            src/data/adventures/index.ts \
            src/data/adventures/summaries.ts \
            src/data/adventures/types.ts \
            public/sitemap.xml \
            react-router.config.ts \
            scripts/refresh-leaderboard.mjs \
            e2e/smoke.spec.ts \
            src/test/seo.test.ts \
            src/test/prerender.test.ts
          git commit -m "feat: sync adventure ${SLUG} from challenges repo (${MODE})"

          # Force-with-lease keeps PR identity and review history when re-syncing.
          git push --force-with-lease origin "$BRANCH"

          if [ "$MODE" = "update" ]; then
            PR_TITLE="feat(adventure): add levels to ${NAME} — ${LEVELS}"
          else
            PR_TITLE="feat(adventure): add ${NAME}"
          fi

          {
            printf '## %s: %s\n\n' "$MODE" "$NAME"
            printf 'Auto-synced from the challenges repo.\n\n'
            printf '**Source:** %s\n\n' "$SOURCE_URL"
            printf '**Levels in this PR:** `%s`\n\n' "$LEVELS"
            printf '---\n\n'
            printf '### Before merging\n\n'
            printf -- '- [ ] Add `contributor:` block to `src/data/adventures/%s/adventure.yaml`\n' "$SLUG"
            printf -- '  ```yaml\n'
            printf -- '  contributor:\n'
            printf -- '    name: "Full Name"\n'
            printf -- '    url: "https://example.com"\n'
            printf -- '    about: "One sentence bio."\n'
            printf -- '  ```\n'
            printf -- '- [ ] Confirm `month:` is correct for the planned release\n'
            printf -- '- [ ] Set `community_category_id:` in `src/data/adventures/%s/adventure.yaml` (look up at https://community.offon.dev/categories.json), then run `npm run generate`\n' "$SLUG"
            printf -- '- [ ] Update `rewards.deadline:` from `TODO` to ISO 8601 (e.g. `2026-07-01T23:59:00+01:00`)\n'
            printf -- '- [ ] Review `topics:` on each level — auto-set to all adventure tags, refine to level-specific subset if needed\n'
            printf -- '- [ ] Update `community_url:` in each level once the Discourse threads are created\n'
            printf -- '- [ ] Update `discussionUrl` in each `*-posts.json` stub\n\n'
            printf '### Manual steps (only if needed)\n\n'
            printf -- '- [ ] If any level uses an SVG `architecture_diagram`, add the SVG to `src/assets/diagrams/` and add `architecture_diagram: <file>.svg` back to that level in `adventure.yaml` (sync strips it)\n'
            printf -- '- [ ] Run `node scripts/refresh-leaderboard.mjs` after `community_category_id` is set\n'
            printf -- '- [ ] Run `node scripts/refresh-discussions.mjs` after `discussionUrl` values are set\n\n'
            printf '### Auto-generated (do not edit by hand)\n\n'
            printf 'The following are kept in sync with `adventure.yaml` by `npm run generate` (prebuild hook):\n'
            printf -- '- `public/sitemap.xml` (GENERATED:adventures region)\n'
            printf -- '- `react-router.config.ts` prerender (GENERATED:adventures region)\n'
            printf -- '- `e2e/smoke.spec.ts` and `src/test/seo.test.ts` route arrays\n'
            printf -- '- `src/test/prerender.test.ts` pages array\n'
            printf -- '- `scripts/refresh-leaderboard.mjs` ADVENTURE_CATEGORIES\n\n'
            printf '### Checks\n\n'
            printf '```sh\n'
            printf 'npm run lint && npm test && npm run build && npm run test:e2e\n'
            printf '```\n'
          } > /tmp/pr-body.md

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body-file /tmp/pr-body.md \
              --head "$BRANCH" \
              --base main
          fi
