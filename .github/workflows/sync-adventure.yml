name: Sync Adventure from Challenges Repo

on:
  workflow_dispatch:
    inputs:
      adventure_url:
        description: >
          URL of the adventure folder in the challenges repo
          (e.g. https://github.com/off-on-dev/open-source-challenges/tree/main/adventures/05-lex-imperfecta)
        required: true
        type: string
      levels:
        description: >
          Comma-separated level IDs to make live now (e.g. beginner or beginner,intermediate).
          Any level requested here (or found in the challenges repo) that isn't promoted to live
          becomes a "Coming Soon" placeholder on the adventure page and in the level page sidebar.
          Leave blank to sync all levels as live.
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Validate URL
        env:
          ADVENTURE_URL: ${{ inputs.adventure_url }}
        run: |
          if ! echo "$ADVENTURE_URL" | grep -qE '^https://github\.com/off-on-dev/open-source-challenges/tree/[^/]+/adventures/'; then
            echo "Error: URL must point to an adventure folder under adventures/ in off-on-dev/open-source-challenges"
            echo "Example: https://github.com/off-on-dev/open-source-challenges/tree/main/adventures/05-lex-imperfecta"
            exit 1
          fi

      - name: Fetch and transform adventure YAML
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADVENTURE_URL: ${{ inputs.adventure_url }}
          LEVELS_TO_SYNC: ${{ inputs.levels }}
        run: node scripts/sync-adventure.mjs

      - name: Validate and regenerate TypeScript
        run: node scripts/generate-adventures.mjs

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG=$(cat /tmp/adventure-slug)
          NAME=$(cat /tmp/adventure-name)
          LEVELS=$(cat /tmp/adventure-levels)
          MODE=$(cat /tmp/adventure-mode)
          BRANCH="feat/adventure-${SLUG}"
          SOURCE_URL="${{ inputs.adventure_url }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch the remote branch first so force-with-lease has a reference to compare
          # against. On a fresh runner with shallow clone we don't have origin/<branch>,
          # which makes force-with-lease unpredictable.
          git fetch origin "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add \
            src/data/adventures/${SLUG}/ \
            src/data/adventures/${SLUG}.generated.ts \
            src/data/adventures/index.ts \
            src/data/adventures/summaries.ts \
            src/data/adventures/types.ts \
            public/sitemap.xml \
            react-router.config.ts \
            scripts/refresh-leaderboard.mjs \
            e2e/smoke.spec.ts \
            src/test/seo.test.ts \
            src/test/prerender.test.ts
          git commit -m "feat: sync adventure ${SLUG} from challenges repo (${MODE})"

          # The branch is owned by this workflow, so a plain --force is safe here and
          # avoids the "stale info" failure mode of --force-with-lease without a ref.
          git push --force origin "$BRANCH"

          if [ "$MODE" = "update" ]; then
            PR_TITLE="feat(adventure): add levels to ${NAME} — ${LEVELS}"
          else
            PR_TITLE="feat(adventure): add ${NAME}"
          fi

          cat > /tmp/pr-body.md <<EOF
          ## ${MODE}: ${NAME}

          Auto-synced from the challenges repo.

          **Source:** ${SOURCE_URL}

          **Levels in this PR:** \`${LEVELS}\`

          ---

          ### Before merging

          - [ ] Add \`contributor:\` block to \`src/data/adventures/${SLUG}/adventure.yaml\`
            \`\`\`yaml
            contributor:
              name: "Full Name"
              url: "https://example.com"
              about: "One sentence bio."
            \`\`\`
          - [ ] Confirm \`month:\` is correct for the planned release
          - [ ] Set \`community_category_id:\` in \`src/data/adventures/${SLUG}/adventure.yaml\` (look up at https://community.offon.dev/categories.json), then run \`npm run generate\`
          - [ ] Update \`rewards.deadline:\` from \`TODO\` to ISO 8601 (e.g. \`2026-07-01T23:59:00+01:00\`)
          - [ ] Review \`topics:\` on each level, auto-set to all adventure tags, refine to level-specific subset if needed
          - [ ] Update \`community_url:\` in each level once the Discourse threads are created
          - [ ] Update \`discussionUrl\` in each \`*-posts.json\` stub

          ### Manual steps (only if needed)

          - [ ] If any level uses an SVG \`architecture_diagram\`, add the SVG to \`src/assets/diagrams/\` and add \`architecture_diagram: <file>.svg\` back to that level in \`adventure.yaml\` (sync strips it)
          - [ ] Run \`node scripts/refresh-leaderboard.mjs\` after \`community_category_id\` is set
          - [ ] Run \`node scripts/refresh-discussions.mjs\` after \`discussionUrl\` values are set

          ### Auto-generated (do not edit by hand)

          The following are kept in sync with \`adventure.yaml\` by \`npm run generate\` (prebuild hook):
          - \`public/sitemap.xml\` (GENERATED:adventures region)
          - \`react-router.config.ts\` prerender (GENERATED:adventures region)
          - \`e2e/smoke.spec.ts\` and \`src/test/seo.test.ts\` route arrays
          - \`src/test/prerender.test.ts\` pages array
          - \`scripts/refresh-leaderboard.mjs\` ADVENTURE_CATEGORIES

          ### Checks

          \`\`\`sh
          npm run lint && npm test && npm run build && npm run test:e2e
          \`\`\`
          EOF

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body-file /tmp/pr-body.md \
              --head "$BRANCH" \
              --base main
          fi
