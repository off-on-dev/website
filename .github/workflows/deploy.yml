name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 02:00 UTC — ensures deadline-based layout changes are reflected without a code push
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Astro static build → dist/ (not dist/client/). Astro emits dist/404.html
      # natively, so the old `cp .../404/index.html 404.html` step is gone.
      - run: npm run build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          force: false
          clean: true
          clean-exclude: |
            pr-preview/
