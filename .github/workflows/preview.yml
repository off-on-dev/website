name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm test

      - uses: actions/upload-artifact@v4
        with:
          name: dist-client
          path: dist/client/
          retention-days: 1

  e2e:
    needs: build
    if: github.event.action != 'closed'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/client/

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e -- --shard=${{ matrix.shard }}/3

  preview:
    needs: [build, e2e]
    # Run when both passed (normal PR update), or when build was skipped (PR closed, cleanup).
    # Never run when tests failed.
    if: always() && ((needs.build.result == 'success' && needs.e2e.result == 'success') || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - if: github.event.action != 'closed'
        run: npm ci

      - if: github.event.action != 'closed'
        run: VITE_BASE_PATH=/pr-preview/pr-${{ github.event.number }}/ npm run build

      - if: github.event.action != 'closed'
        run: |
          PREVIEW_DIR="dist/client/pr-preview/pr-${{ github.event.number }}"
          cp -r dist/client/assets "${PREVIEW_DIR}/"
          cp -r dist/client/fonts "${PREVIEW_DIR}/"
          find dist/client -maxdepth 1 -type f \( -name "*.svg" -o -name "*.png" -o -name "*.ico" -o -name "*.webmanifest" \) -exec cp {} "${PREVIEW_DIR}/" \;
          cp "${PREVIEW_DIR}/index.html" "${PREVIEW_DIR}/404.html"

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist/client/pr-preview/pr-${{ github.event.number }}/
