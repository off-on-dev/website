name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

  preview:
    needs: smoke
    # Run on closed (smoke is skipped, preview cleans up) or when smoke passed.
    # Never run when smoke failed.
    if: always() && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - if: github.event.action != 'closed'
        run: npm ci

      - if: github.event.action != 'closed'
        run: VITE_BASE_PATH=/pr-preview/pr-${{ github.event.number }}/ npm run build

      - if: github.event.action != 'closed'
        run: |
          PREVIEW_DIR="dist/client/pr-preview/pr-${{ github.event.number }}"
          cp -r dist/client/assets "${PREVIEW_DIR}/"
          cp -r dist/client/fonts "${PREVIEW_DIR}/"
          find dist/client -maxdepth 1 -type f \( -name "*.svg" -o -name "*.png" -o -name "*.ico" -o -name "*.webmanifest" \) -exec cp {} "${PREVIEW_DIR}/" \;
          cp "${PREVIEW_DIR}/index.html" "${PREVIEW_DIR}/404.html"

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist/client/pr-preview/pr-${{ github.event.number }}/
