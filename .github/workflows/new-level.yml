name: New Level

on:
  workflow_dispatch:
    inputs:
      adventure:
        description: 'Adventure ID (e.g. "blind-by-design")'
        required: true
        type: string
      level:
        description: 'Level ID (beginner, intermediate, or expert)'
        required: true
        type: choice
        options:
          - beginner
          - intermediate
          - expert

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Validate inputs
        env:
          INPUT_ADVENTURE: ${{ inputs.adventure }}
        run: |
          if ! echo "$INPUT_ADVENTURE" | grep -qE '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then
            echo "Error: Adventure ID must be kebab-case (lowercase letters, numbers, hyphens only)"
            exit 1
          fi

      - name: Run new-level script
        id: scaffold
        env:
          ADVENTURE_ID: ${{ inputs.adventure }}
          LEVEL_ID: ${{ inputs.level }}
        run: |
          OUTPUT=$(node scripts/new-level.mjs \
            --adventure "$ADVENTURE_ID" \
            --level "$LEVEL_ID" 2>&1)
          echo "$OUTPUT"

          # Extract the YAML snippet (from "  - id:" through to just before "Next steps:")
          SNIPPET=$(echo "$OUTPUT" | awk '/^  - id:/{found=1} /^Next steps:/{exit} found')
          echo "snippet<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SNIPPET" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add ${{ inputs.level }} level to ${{ inputs.adventure }}"
          title: "feat: add ${{ inputs.level }} level — ${{ inputs.adventure }}"
          body: |
            ## New Level Added

            | Field | Value |
            |---|---|
            | Adventure | `${{ inputs.adventure }}` |
            | Level | `${{ inputs.level }}` |

            ### Generated
            - `src/data/adventures/${{ inputs.adventure }}/${{ inputs.level }}-posts.json` (discussion stub)
            - Prerender entry in `react-router.config.ts`
            - Sitemap entry in `public/sitemap.xml`

            ### Manual step required
            Paste this into the `levels` array in `src/data/adventures/${{ inputs.adventure }}/adventure.yaml`:

            ```yaml
            ${{ steps.scaffold.outputs.snippet }}
            ```

            ### Next steps
            1. Paste the snippet above and fill in the TODOs
            2. Update `discussionUrl` in the YAML and the `-posts.json` file
            3. Run `node scripts/refresh-discussions.mjs`
            4. Run all checks: `npm run lint && npm test && npm run build && npm run test:e2e`
          branch: "feat/${{ inputs.adventure }}-${{ inputs.level }}"
          delete-branch: true
