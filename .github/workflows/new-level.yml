name: New Level

on:
  workflow_dispatch:
    inputs:
      adventure:
        description: 'Adventure ID (e.g. "blind-by-design")'
        required: true
        type: string
      level:
        description: 'Level ID (beginner, intermediate, or expert)'
        required: true
        type: choice
        options:
          - beginner
          - intermediate
          - expert

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Validate inputs
        env:
          INPUT_ADVENTURE: ${{ inputs.adventure }}
        run: |
          if ! echo "$INPUT_ADVENTURE" | grep -qE '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then
            echo "Error: Adventure ID must be kebab-case (lowercase letters, numbers, hyphens only)"
            exit 1
          fi

      - name: Run new-level script
        id: scaffold
        env:
          ADVENTURE_ID: ${{ inputs.adventure }}
          LEVEL_ID: ${{ inputs.level }}
        run: |
          OUTPUT=$(node scripts/new-level.mjs \
            --adventure "$ADVENTURE_ID" \
            --level "$LEVEL_ID" 2>&1)
          echo "$OUTPUT"

          # Extract the YAML snippet (from "  - id:" through to just before "Next steps:")
          SNIPPET=$(echo "$OUTPUT" | awk '/^  - id:/{found=1} /^Next steps:/{exit} found')
          echo "snippet<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SNIPPET" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADVENTURE: ${{ inputs.adventure }}
          LEVEL: ${{ inputs.level }}
          SNIPPET: ${{ steps.scaffold.outputs.snippet }}
        run: |
          BRANCH="feat/${ADVENTURE}-${LEVEL}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: add ${LEVEL} level to ${ADVENTURE}"
          git push origin "$BRANCH"
          {
            printf '## New Level Added\n\n'
            printf '| Field | Value |\n|---|---|\n'
            printf '| Adventure | `%s` |\n' "$ADVENTURE"
            printf '| Level | `%s` |\n\n' "$LEVEL"
            printf '### Generated\n'
            printf -- '- `src/data/adventures/%s/%s-posts.json` (discussion stub)\n' "$ADVENTURE" "$LEVEL"
            printf -- '- Prerender entry in `react-router.config.ts`\n'
            printf -- '- Sitemap entry in `public/sitemap.xml`\n\n'
            printf '### Manual step required\n'
            printf 'Paste this into the `levels` array in `src/data/adventures/%s/adventure.yaml`:\n\n' "$ADVENTURE"
            printf '```yaml\n%s\n```\n\n' "$SNIPPET"
            printf '### Next steps\n'
            printf '1. Paste the snippet above and fill in the TODOs\n'
            printf '2. Update `discussionUrl` in the YAML and the `-posts.json` file\n'
            printf '3. Run `node scripts/refresh-discussions.mjs`\n'
            printf '4. Run all checks: `npm run lint && npm test && npm run build && npm run test:e2e`\n'
          } > /tmp/pr-body.md
          gh pr create \
            --title "feat: add ${LEVEL} level — ${ADVENTURE}" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH"
