name: Validate Docs

on:
  pull_request:
    paths:
      - 'src/components/**'
      - 'src/hooks/**'
      - 'src/lib/**'
      - 'src/data/constants.ts'
      - 'package.json'
      - '.github/workflows/*.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check docs are up to date
        run: bash scripts/check-docs.sh "origin/${{ github.base_ref }}"
