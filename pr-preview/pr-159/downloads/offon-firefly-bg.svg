<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="bg-glow" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="dot-hi" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"   result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-md" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-lo" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Amber hue — four soft elliptical glows anchored at the bottom -->
  <ellipse cx="640"  cy="820" rx="1280" ry="202" fill="#ffc034" fill-opacity="0.042" filter="url(#bg-glow)"/>
  <ellipse cx="179"  cy="820" rx="307"  ry="187" fill="#ffc034" fill-opacity="0.042" filter="url(#bg-glow)"/>
  <ellipse cx="614"  cy="820" rx="269"  ry="151" fill="#ffc034" fill-opacity="0.029" filter="url(#bg-glow)"/>
  <ellipse cx="1024" cy="820" rx="294"  ry="180" fill="#ffc034" fill-opacity="0.037" filter="url(#bg-glow)"/>

  <!-- Firefly dots — cluster A (left edge) -->
  <circle cx="26"  cy="662" r="0.75" fill="#ffc034" opacity="0.36" filter="url(#dot-lo)"/>
  <circle cx="64"  cy="626" r="1.0"  fill="#ffc034" opacity="0.58" filter="url(#dot-md)"/>
  <circle cx="102" cy="677" r="0.75" fill="#ffc034" opacity="0.40" filter="url(#dot-lo)"/>
  <circle cx="128" cy="648" r="0.75" fill="#ffc034" opacity="0.38" filter="url(#dot-lo)"/>

  <!-- Solo hi -->
  <circle cx="192" cy="612" r="1.5"  fill="#ffc034" opacity="0.82" filter="url(#dot-hi)"/>

  <!-- Cluster B -->
  <circle cx="256" cy="655" r="0.75" fill="#ffc034" opacity="0.42" filter="url(#dot-lo)"/>
  <circle cx="307" cy="619" r="1.0"  fill="#ffc034" opacity="0.60" filter="url(#dot-md)"/>
  <circle cx="358" cy="670" r="0.75" fill="#ffc034" opacity="0.36" filter="url(#dot-lo)"/>
  <circle cx="397" cy="634" r="1.0"  fill="#ffc034" opacity="0.55" filter="url(#dot-md)"/>

  <!-- Solo hi -->
  <circle cx="486" cy="648" r="1.5"  fill="#ffc034" opacity="0.80" filter="url(#dot-hi)"/>

  <!-- Cluster C -->
  <circle cx="550" cy="662" r="0.75" fill="#ffc034" opacity="0.44" filter="url(#dot-lo)"/>
  <circle cx="602" cy="626" r="1.0"  fill="#ffc034" opacity="0.58" filter="url(#dot-md)"/>
  <circle cx="653" cy="677" r="0.75" fill="#ffc034" opacity="0.38" filter="url(#dot-lo)"/>
  <circle cx="691" cy="641" r="0.75" fill="#ffc034" opacity="0.42" filter="url(#dot-lo)"/>

  <!-- Solo hi -->
  <circle cx="781" cy="619" r="1.5"  fill="#ffc034" opacity="0.84" filter="url(#dot-hi)"/>

  <!-- Cluster D -->
  <circle cx="845"  cy="655" r="0.75" fill="#ffc034" opacity="0.38" filter="url(#dot-lo)"/>
  <circle cx="883"  cy="626" r="1.0"  fill="#ffc034" opacity="0.62" filter="url(#dot-md)"/>
  <circle cx="934"  cy="670" r="1.0"  fill="#ffc034" opacity="0.65" filter="url(#dot-md)"/>
  <circle cx="973"  cy="641" r="0.75" fill="#ffc034" opacity="0.40" filter="url(#dot-lo)"/>

  <!-- Solo hi -->
  <circle cx="1062" cy="634" r="1.5"  fill="#ffc034" opacity="0.78" filter="url(#dot-hi)"/>

  <!-- Cluster E (right edge) -->
  <circle cx="1126" cy="655" r="0.75" fill="#ffc034" opacity="0.42" filter="url(#dot-lo)"/>
  <circle cx="1165" cy="612" r="1.0"  fill="#ffc034" opacity="0.55" filter="url(#dot-md)"/>
  <circle cx="1203" cy="670" r="0.75" fill="#ffc034" opacity="0.36" filter="url(#dot-lo)"/>
  <circle cx="1242" cy="634" r="0.75" fill="#ffc034" opacity="0.40" filter="url(#dot-lo)"/>

  <!-- Mist layer (very faint) -->
  <circle cx="115"  cy="684" r="0.75" fill="#ffc034" opacity="0.09" filter="url(#dot-lo)"/>
  <circle cx="179"  cy="670" r="0.75" fill="#ffc034" opacity="0.10" filter="url(#dot-lo)"/>
  <circle cx="358"  cy="691" r="0.75" fill="#ffc034" opacity="0.08" filter="url(#dot-lo)"/>
  <circle cx="563"  cy="677" r="0.75" fill="#ffc034" opacity="0.11" filter="url(#dot-lo)"/>
  <circle cx="614"  cy="691" r="0.75" fill="#ffc034" opacity="0.09" filter="url(#dot-lo)"/>
  <circle cx="832"  cy="684" r="0.75" fill="#ffc034" opacity="0.10" filter="url(#dot-lo)"/>
  <circle cx="973"  cy="670" r="0.75" fill="#ffc034" opacity="0.09" filter="url(#dot-lo)"/>
  <circle cx="1037" cy="684" r="0.75" fill="#ffc034" opacity="0.11" filter="url(#dot-lo)"/>
</svg>
