<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      (function() {
        var loc = window.location;
        var base = loc.pathname.match(/^(\/pr-preview\/pr-\d+)/);
        base = base ? base[1] : '';
        var path = loc.pathname.slice(base.length) || '/';
        loc.replace(
          loc.origin + base +
          '/?p=' + encodeURIComponent(path + loc.search) +
          (loc.hash ? '&h=' + encodeURIComponent(loc.hash.slice(1)) : '')
        );
      })();
    </script>
  </head>
  <body></body>
</html>
