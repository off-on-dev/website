<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var base = '/pr-preview/pr-20';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(base + '/?p=' + encodeURIComponent(path + search) + (hash ? '&h=' + encodeURIComponent(hash.slice(1)) : ''));
    </script>
  </head>
  <body></body>
</html>
